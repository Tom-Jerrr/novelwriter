worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip: biggest win for text-heavy novel content
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-ndjson;
    gzip_min_length 256;
    gzip_vary on;

    # Rate limit zone: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream app {
        server app:8000;
    }

    server {
        listen 80;

        client_max_body_size 35m;

        # API and streaming endpoints
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE / streaming support
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # Everything else (frontend static files served by FastAPI)
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
