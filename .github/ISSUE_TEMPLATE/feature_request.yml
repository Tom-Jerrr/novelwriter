name: Feature Request
description: 提交一个功能建议，帮助维护者判断优先级和实现边界
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出想法。请尽量先说明你的使用场景和当前痛点；如果暂时没有成熟方案，也可以只描述你理想中的结果。

  - type: textarea
    id: use_case
    attributes:
      label: 使用场景
      description: 你在什么情境下需要这个能力？
      placeholder: 我在长篇连载中需要稳定管理角色关系和设定变更……
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 当前痛点
      description: 现在缺少什么，或者哪里不够顺手？
      placeholder: 目前只能手动修改多处设定，容易遗漏……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案 / 理想结果（可选）
      description: 描述你理想中的行为、界面或工作流；如果还没想好方案，也可以只写希望最终达到什么效果
      placeholder: 希望可以在世界模型里批量更新角色关系，并在续写前自动检查冲突……

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 如果你已经尝试过 workaround，也请写出来
      placeholder: 例如先导出 worldpack 再手动编辑 JSON，但流程很重……

  - type: textarea
    id: impact
    attributes:
      label: 影响范围 / 优先级判断
      description: 这个需求更偏向必需、效率优化，还是体验增强？为什么？
      placeholder: 对长篇创作是高频痛点，没有它就很难持续维护设定……

  - type: textarea
    id: additional_context
    attributes:
      label: 补充信息
      description: 可以补充草图、截图、竞品示例、相关讨论链接等
